<svg width="1280" height="360" viewBox="0 0 1280 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="round">
      <rect x="0" y="0" width="1280" height="360" rx="36"/>
    </clipPath>

    <linearGradient id="lime" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EAFF8C"/>
      <stop offset="0.5" stop-color="#C6FF00"/>
      <stop offset="1" stop-color="#9BE000"/>
    </linearGradient>

    <linearGradient id="white" x1="0.2" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#DFE8D4"/>
    </linearGradient>

    <linearGradient id="graphite" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2A2F3A"/>
      <stop offset="1" stop-color="#0E1116"/>
    </linearGradient>

    <radialGradient id="tileGlow" cx="0.32" cy="0.2" r="0.7">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="0.6" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDev="70"/>
    </filter>

    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="14" stdDev="20" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <g clip-path="url(#round)">
    <rect width="1280" height="360" fill="#0a0c07"/>

    <!-- blurred neon-lime glow blobs -->
    <g filter="url(#blur)">
      <circle cx="220" cy="120" r="180" fill="#C6FF00" opacity="0.45"/>
      <circle cx="120" cy="320" r="200" fill="#6FD400" opacity="0.35"/>
      <circle cx="1180" cy="300" r="170" fill="#9BE000" opacity="0.30"/>
    </g>

    <!-- icon mark: graphite tile + lime shield + dark wildcard asterisk -->
    <g transform="translate(80 60)" filter="url(#shadow)">
      <g transform="scale(0.234375)">
        <rect width="1024" height="1024" rx="232" fill="url(#graphite)"/>
        <rect width="1024" height="1024" rx="232" fill="url(#tileGlow)"/>
        <path d="M322 248 L702 248 Q744 248 744 290 L744 474
                 C744 624 662 724 512 802 C362 724 280 624 280 474 L280 290
                 Q280 248 322 248 Z" fill="url(#lime)"/>
        <g transform="translate(512 512) scale(1.05)" fill="#11140C">
          <rect x="-26" y="-104" width="52" height="208" rx="26"/>
          <rect x="-26" y="-104" width="52" height="208" rx="26" transform="rotate(60)"/>
          <rect x="-26" y="-104" width="52" height="208" rx="26" transform="rotate(120)"/>
          <circle r="30"/>
        </g>
      </g>
    </g>

    <!-- wordmark -->
    <text x="385" y="190" font-family="'SF Pro Display','Segoe UI',Helvetica,Arial,sans-serif"
          font-size="104" font-weight="800" fill="url(#white)" letter-spacing="-3">Globber</text>
    <text x="389" y="248" font-family="'SF Pro Text','Segoe UI',Helvetica,Arial,sans-serif"
          font-size="34" font-weight="500" fill="#C6FF00" letter-spacing="0.5">Pattern-matching call blocker for Android</text>

    <!-- accent rule -->
    <rect x="389" y="278" width="300" height="6" rx="3" fill="url(#lime)"/>
  </g>
</svg>
